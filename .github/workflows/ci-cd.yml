name: CI/CD Pipeline — Python

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── Variables globales ──────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── 1. BUILD & LINT ─────────────────────────────────────────
  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint con flake8
        run: |
          # Falla si hay errores de sintaxis o imports no usados
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Advertencias de estilo (no falla el pipeline)
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  # ── 2. TEST ─────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: build                  # Solo corre si build pasó

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]   # Prueba en múltiples versiones

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Correr tests con coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=75        # Falla si coverage < 80%

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml

  # ── 3. DEPLOY (solo en push a main) ─────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build, test]           # Requiere que ambos pasen
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production             # Activa el entorno "production" en GitHub

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # ── Reemplaza este paso con tu destino real ──────────────
      # Opciones comunes:
      #   • AWS:        aws s3 sync / eb deploy / ecs update-service
      #   • GCP:        gcloud run deploy
      #   • Azure:      az webapp deployment
      #   • Servidor:   ssh + rsync (usando secrets)
      - name: Simular deploy (personaliza este paso)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}   # Agrega en Settings > Secrets
        run: |
          echo "✅ Build & tests pasaron. Iniciando deploy a producción..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          # Aquí va tu comando real de deploy

      - name: Notificar éxito
        run: |
          echo "🎉 Deploy completado exitosamente."
          echo "SHA desplegado: ${{ github.sha }}"
